

<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>唐诗意象的时空语义可视化系统</title>
  <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
  <style>
    :root{
      --paper:#efe9d8;
      --ink:#1f201b;
      --muted:#746f61;
      --line:rgba(80,72,52,.24);
      --red:#bd6a5f;
      --green:#80936b;
      --gold:#c39a48;
      --blue:#6f9eaa;
      --teal:#3f8f8d;
      --brown:#a47b52;
      --shadow:rgba(64,48,26,.12);
    }

    *{box-sizing:border-box}
    html,body{
      margin:0;
      width:100%;
      height:100%;
      overflow:hidden;
      background:#e8e3d4;
      color:var(--ink);
      font-family:"Noto Serif SC","Songti SC","SimSun",serif;
    }

    body::before{
      content:"";
      position:fixed;
      inset:0;
      pointer-events:none;
      opacity:.46;
      background:
        radial-gradient(circle at 20% 10%, rgba(255,255,255,.62), transparent 25%),
        radial-gradient(circle at 80% 80%, rgba(120,100,70,.12), transparent 30%),
        repeating-linear-gradient(12deg, rgba(80,70,50,.03) 0 1px, transparent 1px 7px);
      mix-blend-mode:multiply;
    }

    #app{position:relative;width:100vw;height:100vh;padding:26px 34px;}

    .paper{
      position:absolute;
      left:3.2vw;
      right:3.2vw;
      top:5.2vh;
      bottom:3vh;
      background:rgba(244,238,221,.92);
      box-shadow:0 18px 52px rgba(75,62,42,.18);
      border:1px solid rgba(110,96,70,.16);
      overflow:hidden;
    }

    .paper::before{
      content:"";
      position:absolute;
      inset:0;
      pointer-events:none;
      opacity:.28;
      background-image:
        radial-gradient(rgba(90,75,55,.22) .7px, transparent .7px),
        radial-gradient(rgba(255,255,255,.8) .9px, transparent .9px);
      background-size:28px 28px, 42px 42px;
      background-position:0 0, 10px 10px;
    }

    .grid{
      position:relative;
      z-index:1;
      width:100%;
      height:100%;
      padding:36px 42px 30px 42px;
      display:grid;
      grid-template-columns: 40% 30% 30%;
      grid-template-rows: 18% 36% 46%;
      gap:8px 22px;
    }

    .title-block{grid-column:1;grid-row:1;position:relative;padding-left:4px;}
    .title-block h1{margin:0;font-size:29px;letter-spacing:5px;font-weight:600;line-height:1.38;}
    .title-block p{max-width:650px;font-size:10.2px;line-height:1.58;color:#4d493d;margin:8px 0 0;}
    .poetic-preface{
      color:rgba(70,61,48,.72);
      letter-spacing:.5px;
      text-align:justify;
    }
    .poetic-preface .lead{
      display:block;
      margin-bottom:4px;
      color:rgba(46,40,32,.82);
      font-size:11px;
      letter-spacing:1.2px;
      font-family:"STKaiti","KaiTi","FangSong","Noto Serif SC",serif;
    }

    .mini-intro{display:none;}
    .mini-card{display:grid;grid-template-columns:44px 1fr;gap:8px;align-items:center;min-width:0;}
    .mini-icon{font-size:30px;filter:saturate(.86);}
    .mini-card b{font-size:12px;font-weight:600;display:block;margin-bottom:3px;}
    .mini-card span{font-size:10px;color:var(--muted);line-height:1.35;display:block;}

    .right-title{display:none;}
    .right-title h2{margin:0;font-size:18px;letter-spacing:3px;font-weight:600;text-align:right;}
    .right-title p{font-size:10.5px;line-height:1.55;color:var(--muted);margin:8px 0 0 auto;max-width:610px;}

    #chordPanel{grid-column:1;grid-row:2 / 4;position:relative;}
    #seasonPanel{
      grid-column:2 / 4;
      grid-row:1 / 3;
      position:relative;
      display:block;
      overflow:visible;
      padding-top:26px;
    }
    #bubblePanel{grid-column:2;grid-row:3;position:relative;overflow:hidden;padding-top:28px;}
    #timelinePanel{grid-column:3;grid-row:3;position:relative;}

    .panel-title{position:absolute;left:8px;top:0;font-size:18px;letter-spacing:3px;color:#2f2d26;z-index:5;}
    .small-note{position:absolute;left:12px;bottom:4px;width:70%;font-size:10px;line-height:1.7;color:var(--muted);}
    svg{display:block;width:100%;height:100%;overflow:visible;}

    .motif-panel-title{
      position:absolute;
      left:10px;
      top:0;
      z-index:8;
      font-family:"STKaiti","KaiTi","Noto Serif SC","Songti SC",serif;
      font-size:17px;
      letter-spacing:4px;
      font-weight:600;
      color:rgba(43,38,30,.86);
      pointer-events:none;
    }
    .motif-panel-title::after{
      content:"";
      position:absolute;
      left:0;
      right:-10px;
      bottom:-6px;
      height:1px;
      background:linear-gradient(90deg, rgba(120,100,70,.26), transparent);
    }


    .season-card{position:relative;overflow:hidden;}
    .season-title{position:absolute;left:22px;top:2px;font-size:46px;font-weight:600;line-height:1;z-index:2;font-family:"STKaiti","KaiTi","Noto Serif SC",serif;}
    .season-words{position:absolute;right:16px;top:28px;max-width:160px;text-align:left;font-size:10px;line-height:1.55;color:#4d493d;z-index:2;}
    .season-arc{position:absolute;left:82px;top:42px;width:190px;height:110px;}

    .semantic-flow-svg{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      overflow:visible;
      z-index:3;
    }
    .semantic-flow-title{
      font-family:"STKaiti","KaiTi","Noto Serif SC",serif;
      font-size:44px;
      font-weight:600;
      dominant-baseline:middle;
    }
    .semantic-flow-name{
      font-size:14px;
      letter-spacing:2px;
      fill:rgba(45,40,32,.78);
      dominant-baseline:middle;
      font-weight:600;
    }
    .semantic-flow-desc{
      position:absolute;
      left:16px;
      right:16px;
      bottom:8px;
      z-index:4;
      font-size:10px;
      line-height:1.55;
      color:rgba(82,75,62,.72);
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:16px;
    }
    .semantic-flow-icons{
      position:absolute;
      left:0;
      right:0;
      bottom:45px;
      z-index:4;
      display:grid;
      grid-template-columns:repeat(4,1fr);
      pointer-events:none;
    }
    .semantic-flow-icons div{
      text-align:center;
      font-size:27px;
      letter-spacing:8px;
      opacity:.84;
      filter:saturate(.86);
      white-space:nowrap;
    }
    .semantic-track-bg{
      fill:none;
      stroke:rgba(84,75,58,.075);
      stroke-linecap:round;
    }
    .semantic-track-active{
      fill:none;
      stroke-linecap:round;
      filter:drop-shadow(0 2px 2px rgba(90,70,38,.08));
    }
    .semantic-track-boundary{
      fill:none;
      stroke:rgba(116,105,78,.16);
      stroke-width:1.2;
      stroke-dasharray:5 8;
    }
    .semantic-track-label{
      font-size:9px;
      fill:rgba(44,39,31,.68);
      dominant-baseline:middle;
    }
    .semantic-track-dot{
      stroke:rgba(255,250,235,.92);
      stroke-width:1.4;
    }
    .semantic-period-legend{
      position:absolute;
      left:16px;
      bottom:4px;
      display:flex;
      gap:9px;
      font-size:10px;
      color:rgba(70,63,52,.72);
      z-index:8;
    }
    .semantic-period-legend span{display:inline-flex;align-items:center;gap:4px;}
    .semantic-period-legend i{
      width:8px;
      height:8px;
      display:inline-block;
      border-radius:50%;
      border:1px solid rgba(90,75,50,.18);
    }

    .tooltip{
      position:fixed;
      z-index:20;
      pointer-events:none;
      /* 半透明提示框：不再用纯白底遮挡图形 */
      background:rgba(255,252,240,.54);
      border:1px solid rgba(90,78,55,.13);
      box-shadow:0 4px 12px rgba(40,32,18,.08);
      padding:6px 8px;
      border-radius:8px;
      font-size:10px;
      line-height:1.42;
      max-width:210px;
      color:rgba(36,32,26,.78);
      opacity:0;
      transform:translate(-50%,-118%);
      backdrop-filter:blur(2px);
      -webkit-backdrop-filter:blur(2px);
    }
    .tooltip b{font-size:10.5px;font-weight:600;}

    .legend{position:absolute;left:12px;bottom:18px;display:flex;gap:12px;flex-wrap:wrap;max-width:80%;font-size:10px;color:#4e493d;}
    .legend-item{display:flex;align-items:center;gap:5px;}
    .dot{width:12px;height:12px;border-radius:50%;display:inline-block;border:1px solid rgba(0,0,0,.1)}



    /* 环形意象数量排名图 */
    #rankSvg{position:absolute;left:0;right:104px;top:42px;bottom:8px;width:calc(100% - 104px);height:calc(100% - 50px);display:block;overflow:visible;}
    .ring-bg { fill: none; stroke: rgba(89, 79, 59, 0.10); stroke-width: 1; }
    .ring-bg.main { stroke: rgba(89, 79, 59, 0.20); stroke-dasharray: 7 8; }
    .radial-grid { stroke: rgba(87, 77, 55, 0.12); stroke-width: 1; }
    .period-arc { fill: none; stroke-linecap: butt; opacity: .55; }
    .period-label { font-size: 10px; fill: rgba(47, 43, 34, .70); letter-spacing: 1px; }
    .year-label { fill: rgba(40,36,30,.74); font-size: 8px; font-weight: 600; text-anchor: middle; }
    .rank-label { fill: rgba(40,36,30,.62); font-size: 8px; dominant-baseline: middle; }
    .flow-line { fill: none; stroke-width: 2.3; stroke-linecap: round; stroke-linejoin: round; opacity: .82; filter: drop-shadow(0 2px 2px rgba(90,70,38,.10)); }
    .flow-line.muted { opacity: .08; }
    .flow-line.active { stroke-width: 4.2; opacity: 1; }
    .node { stroke: rgba(245,238,220,.95); stroke-width: 1.4; cursor: pointer; }
    .node-label { font-size: 8px; fill: rgba(38,34,28,.75); dominant-baseline: middle; pointer-events: none; }
    .center-title { text-anchor: middle; dominant-baseline: middle; fill: rgba(37,33,27,.84); font-size: 22px; letter-spacing: 5px; }
    .center-subtitle { text-anchor: middle; dominant-baseline: middle; fill: rgba(57,51,40,.58); font-size: 9px; letter-spacing: 1px; }
    .rank-note{
      position:absolute;
      left:126px;
      right:108px;
      top:2px;
      bottom:auto;
      width:auto;
      text-align:left;
      font-size:7.8px;
      line-height:1.35;
      color:rgba(82,75,62,.54);
      z-index:5;
      pointer-events:none;
      background:rgba(246,239,221,.10);
      border-radius:8px;
      padding:2px 5px;
    }
    .rank-legend{position:absolute;right:0;top:58px;bottom:auto;z-index:7;width:96px;display:grid;grid-template-columns:1fr;gap:3px;font-size:8.3px;color:rgba(48,43,34,.72);}
    .rank-legend-item{display:flex;align-items:center;gap:5px;min-width:0;cursor:pointer;}
    .rank-legend-dot{width:7px;height:7px;border-radius:50%;border:1px solid rgba(70,60,42,.18);flex:0 0 auto;}
    .rank-legend-name{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}



    /* 相关诗句词云 */
    .poem-cloud-panel{
      position:absolute;left:8px;right:8px;top:28px;bottom:6px;
      padding:8px 10px 10px;border:1px solid rgba(122,104,72,.12);border-radius:16px;
      background:rgba(250,245,228,.18);overflow:hidden;
    }
    .poem-cloud-head{position:relative;z-index:2;display:flex;align-items:baseline;justify-content:space-between;gap:8px;margin-bottom:4px;color:rgba(45,40,32,.78);}
    .poem-cloud-head b{font-size:12px;letter-spacing:2px;font-weight:600;}
    .poem-cloud-head span{font-size:9px;color:rgba(92,83,67,.64);white-space:nowrap;}
    .poem-cloud-words{position:relative;z-index:1;height:calc(100% - 24px);display:block;padding:4px 4px 8px;overflow:hidden;}
    .poem-cloud-word{position:absolute;display:block;max-width:92%;color:rgba(43,38,29,.96);line-height:1.2;white-space:nowrap;text-shadow:0 1px 0 rgba(255,252,240,.78);transition:opacity .18s ease, transform .18s ease;transform-origin:center center;}
    .poem-cloud-word:hover{opacity:1!important;transform:translate(-50%,-50%) scale(1.05) rotate(0deg)!important;}
    .poem-cloud-empty{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;text-align:center;font-size:11px;line-height:1.8;color:rgba(92,83,67,.62);padding:18px;}

    .axis text{font-size:9px;fill:#605a4d}.axis path,.axis line{stroke:rgba(70,62,45,.28)}
    .muted-text{font-size:10px;fill:#746f61}.label{font-size:10px;fill:#292722}.tiny{font-size:8px;fill:#605a4d}
    .fade{opacity:.34!important}.highlight{opacity:1!important;stroke-opacity:1!important;fill-opacity:1!important}
    .poet-arc{cursor:pointer;transition:opacity .18s ease;}
    .poet-label{font-size:8px;fill:rgba(70,62,48,.78);dominant-baseline:middle;pointer-events:none;}
    .poet-imagery-link{fill:none;stroke-linecap:round;stroke-linejoin:round;mix-blend-mode:multiply;pointer-events:stroke;transition:opacity .16s ease, stroke-width .16s ease, filter .16s ease;}
    .poet-imagery-link.fade{opacity:.012!important;}
    .poet-imagery-link.active{opacity:.96!important;stroke-width:3.2!important;filter:drop-shadow(0 2px 3px rgba(42,32,18,.22));}
    .poet-imagery-hit{fill:none;stroke:transparent;stroke-width:12;pointer-events:stroke;}

    .cross-view-imagery{transition:opacity .16s ease, stroke-width .16s ease, fill-opacity .16s ease, stroke-opacity .16s ease;}
    /* 跨视图联动时只“压低”其他意象，不再隐藏到只剩一种 */
    .global-imagery-muted{opacity:.42!important;fill-opacity:.34!important;stroke-opacity:.34!important;}
    .global-imagery-active{opacity:1!important;fill-opacity:.96!important;stroke-opacity:1!important;}
    .flow-line.global-imagery-active{stroke-width:4.2!important;}
    .semantic-track-active.global-imagery-active{stroke-width:8!important;}
    .chord-imagery-arc.global-imagery-active{stroke:#3b3328!important;stroke-width:1.8!important;}
    .cross-view-ribbon{transition:opacity .16s ease, fill-opacity .16s ease, stroke-opacity .16s ease;}
    .cross-view-ribbon.global-imagery-active{fill-opacity:.38!important;stroke-opacity:.65!important;}

    .semantic-flow-desc-compact{
      left:auto !important;
      right:2px !important;
      top:0 !important;
      bottom:auto !important;
      width:360px !important;
      display:block !important;
      grid-template-columns:none !important;
      padding:7px 10px;
      border-radius:10px;
      background:rgba(246,239,221,.66);
      border:1px solid rgba(110,96,70,.10);
      box-shadow:0 3px 10px rgba(70,55,32,.045);
      font-size:9.5px !important;
      line-height:1.55 !important;
      color:rgba(72,65,54,.70) !important;
      pointer-events:none;
    }
  

    /* =========================
       文人化视觉重塑：宣纸肌理、水墨过渡、书法层级
       ========================= */
    html,body{
      background:
        radial-gradient(circle at 15% 8%, rgba(255,252,236,.72), transparent 28%),
        radial-gradient(circle at 85% 92%, rgba(136,107,65,.12), transparent 32%),
        #e4ddca;
    }
    body::before{
      opacity:.62;
      background:
        radial-gradient(circle at 18% 12%, rgba(255,255,255,.58), transparent 26%),
        radial-gradient(circle at 82% 78%, rgba(110,82,44,.12), transparent 35%),
        radial-gradient(rgba(80,64,42,.08) .55px, transparent .75px),
        radial-gradient(rgba(255,255,255,.42) .65px, transparent .9px),
        repeating-linear-gradient(96deg, rgba(102,86,58,.025) 0 1px, transparent 1px 12px),
        repeating-linear-gradient(6deg, rgba(255,255,255,.03) 0 1px, transparent 1px 10px);
      background-size:auto, auto, 11px 11px, 17px 17px, auto, auto;
      background-position:0 0,0 0,1px 2px,6px 8px,0 0,0 0;
      mix-blend-mode:multiply;
    }
    .paper{
      background:
        radial-gradient(circle at 20% 18%, rgba(255,253,238,.82), transparent 34%),
        radial-gradient(circle at 76% 72%, rgba(185,158,100,.10), transparent 40%),
        linear-gradient(115deg, rgba(255,250,232,.72), rgba(239,229,202,.78)),
        rgba(244,238,221,.92);
      box-shadow:0 22px 58px rgba(70,55,31,.19), inset 0 0 48px rgba(139,110,62,.045);
    }
    .paper::before{
      opacity:.34;
      background-image:
        radial-gradient(rgba(92,72,45,.20) .55px, transparent .75px),
        radial-gradient(rgba(255,255,255,.55) .75px, transparent .95px),
        repeating-linear-gradient(88deg, rgba(94,78,49,.028) 0 1px, transparent 1px 9px),
        repeating-linear-gradient(2deg, rgba(120,96,55,.018) 0 1px, transparent 1px 13px);
      background-size:20px 20px, 34px 34px, auto, auto;
      background-position:0 0, 12px 9px, 0 0, 0 0;
    }
    .paper::after{
      content:"";
      position:absolute;
      inset:0;
      pointer-events:none;
      opacity:.28;
      background:
        radial-gradient(ellipse at 42% 48%, rgba(91,128,109,.10), transparent 30%),
        radial-gradient(ellipse at 58% 36%, rgba(174,118,74,.075), transparent 22%),
        radial-gradient(circle at 69% 58%, rgba(150,54,62,.045) 0 2px, transparent 3px),
        radial-gradient(circle at 72% 55%, rgba(189,137,70,.050) 0 1.6px, transparent 2.8px),
        radial-gradient(circle at 48% 61%, rgba(110,137,112,.052) 0 1.8px, transparent 3px);
      mix-blend-mode:multiply;
    }
    .title-block h1,
    .semantic-flow-title,
    .panel-title,
    .right-title h2{
      font-family:"STKaiti","KaiTi","FangSong","Noto Serif SC",serif;
    }
    .title-block h1{font-size:31px;color:rgba(31,31,25,.92);text-shadow:0 1px 0 rgba(255,252,235,.72);}
    .panel-title{color:rgba(42,38,30,.84);font-weight:500;}
    .right-title p,.title-block p,.small-note,.rank-note{color:rgba(90,82,66,.64);}
    .flow-bridge{position:absolute;z-index:0;pointer-events:none;opacity:.26;filter:blur(.05px);}
    .flow-bridge svg{width:100%;height:100%;overflow:visible;}
    .flow-bridge path{fill:none;stroke:rgba(99,129,110,.46);stroke-width:1.1;stroke-linecap:round;stroke-dasharray:1 7;}
    .flow-bridge .petal{fill:rgba(181,119,83,.32);stroke:rgba(255,248,230,.55);stroke-width:.4;}
    .bridge-1{left:37%;top:48%;width:18%;height:18%;}
    .bridge-2{left:55%;top:58%;width:16%;height:14%;opacity:.22;}
    .semantic-icon-mark{font-family:"STKaiti","KaiTi","Noto Serif SC",serif;font-size:22px;dominant-baseline:middle;text-anchor:middle;opacity:.54;pointer-events:none;}
    .semantic-flow-title{filter:drop-shadow(0 1px 0 rgba(255,250,235,.7));}
    .semantic-track-active{opacity:.72;}
    .semantic-track-bg{stroke:rgba(116,104,76,.075);}
    .semantic-track-dot{stroke-width:1.1;}
    html,body{
      background:#e8e3d4 !important;
    }
    .paper{
      background:
        radial-gradient(circle at 18% 16%, rgba(255,252,242,.36), transparent 30%),
        radial-gradient(circle at 78% 74%, rgba(171,146,97,.06), transparent 36%),
        rgba(244,238,221,.92) !important;
      box-shadow:0 18px 52px rgba(75,62,42,.18), inset 0 0 42px rgba(139,110,62,.035);
    }
    .semantic-center-photo-frame{
      fill:rgba(255,250,240,.72);
      stroke:rgba(116,98,70,.22);
      stroke-width:1.4;
      filter:drop-shadow(0 3px 8px rgba(60,48,30,.14));
    }
    .semantic-center-photo-image{
      opacity:.97;
    }
    .semantic-center-photo-ring{
      fill:none;
      stroke:rgba(255,252,244,.92);
      stroke-width:2.2;
      pointer-events:none;
    }

    .poem-cloud-panel{
      border:1px solid rgba(122,104,72,.105);
      background:
        radial-gradient(circle at 12% 18%, rgba(255,252,237,.46), transparent 34%),
        radial-gradient(circle at 86% 70%, rgba(113,142,119,.075), transparent 30%),
        rgba(250,245,228,.22);
      box-shadow:inset 0 0 24px rgba(132,106,64,.035);
    }
    .poem-cloud-words{display:block!important;position:relative!important;height:calc(100% - 22px)!important;padding:0!important;}
    .poem-cloud-word{
      position:absolute;max-width:none;white-space:nowrap;transform-origin:center center;
      font-family:"FangSong","STKaiti","KaiTi","Noto Serif SC",serif;letter-spacing:.5px;
      text-shadow:0 1px 0 rgba(255,253,241,.72), 0 2px 5px rgba(68,52,30,.10);
      transition:opacity .18s ease, transform .18s ease, filter .18s ease;
    }
    .poem-cloud-word:hover{filter:drop-shadow(0 2px 3px rgba(72,54,30,.16));}
    .chord-imagery-arc{fill-opacity:.78!important;}
    .cross-view-ribbon{fill-opacity:.16!important;stroke-opacity:.25!important;}
    .poet-arc{opacity:.78!important;}
    .poet-imagery-link{opacity:.34;}
    .ring-bg{stroke:rgba(89,79,59,.085)!important;}
    .flow-line{opacity:.72;}



    /* 底部两块整体上移，避免词云和环形排名超出下边界 */
    #bubblePanel,
    #timelinePanel{
      transform:translateY(-22px);
    }
    #bubblePanel{padding-top:22px;}
    #timelinePanel{padding-top:0;}

    /* 相关诗句改为卷轴式上下排列，不再散点词云 */
    .poem-cloud-panel{
      top:34px !important;
      bottom:20px !important;
      padding:10px 14px 14px !important;
    }
    .poem-cloud-words{

let poemCloudPoems = [];
let poemCloudDefault = [];

function hashCode(str){
  return Array.from(String(str || "")).reduce((sum, ch) => ((sum << 5) - sum + ch.charCodeAt(0)) | 0, 0);
}

function flattenTextValue(value){
  if(value === undefined || value === null) return "";
  if(Array.isArray(value)){
    return value.flat(Infinity).filter(v => v !== undefined && v !== null).map(v => String(v).trim()).filter(Boolean).join("\n");
  }
  return String(value).trim();
}

function looksLikePoemBody(text, poem){
  const t = String(text || "").trim();
  if(!t) return false;
  const title = String(poem.title || poem.题名 || poem.name || poem.名称 || "").trim();
  const author = String(poem.author || poem.作者 || "").trim();
  if(title && t === title) return false;
  if(author && t === author) return false;
  if(/^《.*》/.test(t) && t.length < 24) return false;
  if(/[，。！？；、\n]/.test(t)) return true;
  if(t.length >= 10 && (!title || t !== title)) return true;
  return false;
}

function getPoemText(poem){
  // 只取“诗文正文”字段，不再把 title / 题名 当作诗句显示。
  const fields = [
    "content", "full_text", "fullText", "text", "poem_text", "poemText",
    "body", "original", "paragraphs", "lines", "sentences",
    "正文", "诗文", "原文", "内容", "句子"
  ];
  for(const key of fields){
    const v = flattenTextValue(poem[key]);
    if(looksLikePoemBody(v, poem)) return v;
  }
  return "";
}

function splitPoemSentences(text){
  const raw = String(text || "")
    .replace(/<[^>]*>/g, "")
    .replace(/[\r\t ]+/g, "")
    .replace(/([。！？；])/g, "$1\n")
    .split(/\n+/)
    .map(d => d.trim())
    .filter(Boolean);

  const lines = [];
  raw.forEach(seg => {
    let s = seg.replace(/[。！？；]+$/g, "");
    if(!s || s.length < 3) return;
    if(s.length > 22 && /，/.test(s)){
      const parts = s.split(/，/).map(d => d.trim()).filter(Boolean);
      for(let i = 0; i < parts.length; i += 2){
        const pair = parts.slice(i, i + 2).join("，");
        if(pair.length >= 3) lines.push(pair.length > 24 ? pair.slice(0, 24) + "…" : pair);
      }
    }else{
      lines.push(s.length > 24 ? s.slice(0, 24) + "…" : s);
    }
  });
  return lines;
}

function preparePoemCloudSource(rawPoems, categoryMap){
  const rows = Array.isArray(rawPoems) ? rawPoems : [];
  return rows.map((p, idx) => {
    const matched = Array.isArray(p.matched_imagery)
      ? p.matched_imagery
      : Array.isArray(p.imagery)
        ? p.imagery
        : Array.isArray(p.images)
          ? p.images
          : [];
    const normalized = [...new Set(matched.map(d => normalizeName(String(d).trim(), categoryMap)).filter(Boolean))];
    return {
      ...p,
      id: p.id || `cloud-`,
      title: p.title || p.题名 || p.name || "",
      author: p.author || p.作者 || "",
      matched_imagery: matched.map(d => String(d).trim()).filter(Boolean),
      imagery_norm: normalized
    };
  }).filter(p => getPoemText(p));
}

function poemMatchesImagery(poem, imagery){
  const raw = Array.isArray(poem.matched_imagery) ? poem.matched_imagery : [];
  const norm = Array.isArray(poem.imagery_norm) ? poem.imagery_norm : [];
  const text = getPoemText(poem);
  return raw.includes(imagery) || norm.includes(imagery) || text.includes(imagery);
}

function makePoemCloudItems(filter){
  const poems = poemCloudPoems || [];
  let candidates = [];
  if(filter?.type === "poet") candidates = poems.filter(p => p.author === filter.name);
  else if(filter?.type === "poetImagery") candidates = poems.filter(p => p.author === filter.author && poemMatchesImagery(p, filter.imagery));
  else if(filter?.type === "imagery") candidates = poems.filter(p => poemMatchesImagery(p, filter.name));
  else candidates = poemCloudDefault.length ? poemCloudDefault : poems.slice(0, 80);

  const items = [];
  candidates.slice(0, 160).forEach((poem, idx) => {
    const text = getPoemText(poem);
    if(!text) return;
    let lines = splitPoemSentences(text);
    if((filter?.type === "imagery" || filter?.type === "poetImagery") && lines.some(line => line.includes(filter.name || filter.imagery))){
      const keyWord = filter.name || filter.imagery;
      lines = lines.filter(line => line.includes(keyWord));
    }
    // 不再用《题目》作者作为兜底内容；没有正文就不显示。
    lines.slice(0, 2).forEach((line, j) => {
      items.push({
        text: line,
        title: poem.title || poem.题名 || "",
        author: poem.author || poem.作者 || "",
        score: Math.max(1, 8 - idx * 0.05 - j * 0.45),
        key: `${line}-${poem.title || ""}-${idx}-${j}`
      });
    });
  });
  const seen = new Set();
  return items.filter(d => { if(seen.has(d.text)) return false; seen.add(d.text); return true; }).slice(0, 26);
}

function drawPoemCloud(filter){
  ensurePanelText('#bubblePanel', '相关诗句词云', '', 'small-note');
  const panel = d3.select("#poemCloudPanel");
  if(panel.empty()) return;
  panel.selectAll("*").remove();

  let label = "常见意象相关诗句";
  let sub = "悬停其他视图中的诗人或意象以更新";
  if(filter?.type === "poet") { label = `${filter.name}相关诗句`; sub = "按诗人筛选"; }
  if(filter?.type === "imagery") { label = `${filter.name}相关诗句`; sub = "按意象筛选"; }
  if(filter?.type === "poetImagery") { label = `${filter.author} × ${filter.imagery}`; sub = "诗人与意象交集"; }

  panel.append("div")
    .attr("class", "poem-cloud-head")
    .html(`<b>${label}</b><span>${sub}</span>`);

  const items = makePoemCloudItems(filter);
  if(!items.length){
    panel.append("div")
      .attr("class", "poem-cloud-empty")
      .html("没有找到可显示的诗句正文。<br/>请确认 sampled_1000_imagery_poems.json 中包含 paragraphs 字段，或 content、text、正文、诗文等诗文正文字段。");
    return;
  }

  // 卷轴式上下排列：每一句诗从上到下依次展开，避免散点词云造成底部溢出。
  const displayItems = items.slice(0, 18);
  const maxScore = d3.max(displayItems, d => d.score) || 1;
  const minScore = d3.min(displayItems, d => d.score) || 0;
  const size = d3.scaleLinear().domain([minScore, maxScore]).range([12.5, 21]);
  const opacity = d3.scaleLinear().domain([minScore, maxScore]).range([.70, .98]);
  const colors = [
    "rgba(34,79,67,.96)",
    "rgba(114,63,45,.94)",
    "rgba(147,98,33,.95)",
    "rgba(58,53,44,.92)",
    "rgba(126,57,72,.93)"
  ];

  const cloud = panel.append("div").attr("class", "poem-cloud-words poem-cloud-scroll");
  cloud.selectAll("div")
    .data(displayItems, d => d.key)
    .join("div")
    .attr("class", "poem-cloud-word")
    .style("font-size", d => `${size(d.score)}px`)
    .style("opacity", d => opacity(d.score))
    .style("color", d => colors[Math.abs(hashCode(d.text)) % colors.length])
    .style("margin-top", (d, i) => `${[0, 18, 7, 28, 12, 36, 4, 22, 14, 32, 6, 25, 10, 38, 2, 20, 16, 30][i % 18]}px`)
    .style("font-weight", (d, i) => i < 4 ? 600 : 400)
    .attr("title", d => `${d.author || ""} ${d.title || ""}`)
    .text(d => d.text);
}

function setGlobalImageryFocus(name){
  const target = String(name || "").trim();
  if(!target) return;

  d3.selectAll(".cross-view-imagery")
    .classed("global-imagery-muted", function(){ return this.getAttribute("data-imagery") !== target; })
    .classed("global-imagery-active", function(){ return this.getAttribute("data-imagery") === target; });

  d3.selectAll(".cross-view-ribbon")
    .classed("global-imagery-muted", function(){
      return this.getAttribute("data-source") !== target && this.getAttribute("data-target") !== target;
    })
    .classed("global-imagery-active", function(){
      return this.getAttribute("data-source") === target || this.getAttribute("data-target") === target;
    });
}

function clearGlobalImageryFocus(){
  d3.selectAll(".cross-view-imagery,.cross-view-ribbon")
    .classed("global-imagery-muted", false)
    .classed("global-imagery-active", false);

function resetPoemCloud(){ clearGlobalImageryFocus(); drawPoemCloud(null); }

function updatePoemCloudByPoetImagery(author, imagery){ drawPoemCloud({type:"poetImagery", author, imagery}); }


function getCol(row, names, fallback=""){
  for(const n of names){ if(row[n] !== undefined && row[n] !== null && String(row[n]).trim() !== "") return String(row[n]).trim(); }
  return fallback;
}

function normalizeName(name, categoryMap){
  const item = categoryMap.get(name);
  return item?.normalize_to || item?.normalize || name;
}

function aggregateData(poems, coData, yixiangRows){
  const categoryMap = new Map();
  yixiangRows.forEach(r => {
    const imagery = getCol(r, ["imagery", "意象", "name", "名称"]);
    if(!imagery) return;
    categoryMap.set(imagery, {
      imagery,
      category: getCol(r, ["category", "一级分类", "顶级分类", "类别"], "未分类"),
      subcategory: getCol(r, ["subcategory", "二级分类", "子类"], "未分类"),
      season: getCol(r, ["season", "季节"], ""),
      normalize_to: getCol(r, ["normalize_to", "归一化", "标准意象"], imagery)
    });
  });

  const poemImagery = poems.map(p => {
    const arr = Array.isArray(p.matched_imagery) ? p.matched_imagery : [];
    return {...p, imagery_norm: [...new Set(arr.map(d => normalizeName(d, categoryMap)).filter(Boolean))]};
  });

  const freq = d3.rollup(
    poemImagery.flatMap(p => p.imagery_norm.map(name => ({name, p}))),
    v => v.length,
    d => d.name
  );

  const categoryStats = Array.from(freq, ([name, value]) => {
    const info = categoryMap.get(name) || categoryMap.get([...categoryMap.keys()].find(k => categoryMap.get(k).normalize_to === name)) || {};
    return {
      name, value,
      category: info.category || "未分类",
      subcategory: info.subcategory || "未分类",
      season: info.season || ""
    };
  }).sort((a,b)=>d3.descending(a.value,b.value));

  const coNormCounter = new Map();
  coData.forEach(d => {
    const a = normalizeName(d.source, categoryMap), b = normalizeName(d.target, categoryMap);
    if(!a || !b || a === b) return;
    const key = [a,b].sort().join("||");
    coNormCounter.set(key, (coNormCounter.get(key)||0) + (+d.value || 0));
  });
  const coNorm = Array.from(coNormCounter, ([key,value]) => {
    const [source,target] = key.split("||");
    return {source,target,value};
  }).sort((a,b)=>d3.descending(a.value,b.value));

  const timeline = [];
  poemImagery.forEach(p => {
    const period = p.tang_period || "未知";
    p.imagery_norm.forEach(img => timeline.push({period, imagery: img, poem: p.title, author: p.author, year: p.estimated_year}));
  });
  const timelineStats = Array.from(d3.rollup(timeline, v => v.length, d => d.period, d => d.imagery), ([period, m]) =>
    Array.from(m, ([imagery, value]) => ({period, imagery, value}))
  ).flat();

  return {poems: poemImagery, categoryMap, categoryStats, coNorm, timelineStats, freq};
}

function getPeriodForPoem(poem) {
  if (poem.tang_period && poem.tang_period !== "未知") return poem.tang_period;
  const year = Number(poem.estimated_year);
  if (!Number.isFinite(year)) return "未知";
  if (year <= 712) return "初唐";
  if (year <= 765) return "盛唐";
  if (year <= 835) return "中唐";
  if (year <= 907) return "晚唐";
  return "未知";
}

function normalizeForCore(word) {
  const alias = {
    "明月": "月", "月亮": "月", "婵娟": "月",
    "白云": "云",
    "流水": "水", "春水": "水", "江水": "水", "秋水": "水", "东流之水": "水",
    "西风": "风", "秋雨": "雨", "细雨": "雨", "冰雪": "雪",
    "杨柳": "柳", "梅花": "梅", "鸿雁": "雁", "猿啸": "猿", "猿鸣": "猿",
    "离愁": "愁", "忧愁": "愁"
  };
  return alias[word] || word;
}

function buildMotifStats(poems) {
  const allCoreWords = new Set(semanticMotifConfig.flatMap(d => d.words));
  const statMap = new Map();

  allCoreWords.forEach(word => {
    statMap.set(word, {
      name: word,
      total: 0,
      period: {"初唐": 0, "盛唐": 0, "中唐": 0, "晚唐": 0, "未知": 0}
    });
  });

  poems.forEach(poem => {
    const period = getPeriodForPoem(poem);
    const words = poem.imagery_norm || poem.matched_imagery || [];
    const normalized = Array.from(new Set(words.map(normalizeForCore)));

    normalized.forEach(word => {
      if (!allCoreWords.has(word)) return;
      const item = statMap.get(word);
      item.total += 1;
      item.period[period] = (item.period[period] || 0) + 1;
    });
  });

  statMap.forEach(item => {
    const entries = periodOrderForMotif.map(p => ({ period: p, value: item.period[p] || 0 }));
    const peak = entries.sort((a, b) => d3.descending(a.value, b.value))[0];
    item.peakPeriod = peak && peak.value > 0 ? peak.period : "未知";

    const values = periodOrderForMotif.filter(p => p !== "未知").map(p => item.period[p] || 0);
    const totalKnown = d3.sum(values);
    const maxKnown = d3.max(values) || 0;
    item.concentration = totalKnown > 0 ? maxKnown / totalKnown : 0;
  });

  return statMap;
}

function drawSemanticMotifModules(poems, categoryStats) {
  const panel = d3.select("#seasonPanel");
  panel.selectAll("*").remove();
  panel.append("div")
    .attr("class", "motif-panel-title")
    .text("意象语义流变");

  const statMap = buildMotifStats(poems);
  const modules = semanticMotifConfig.map((cfg, idx) => {
    const words = cfg.words
      .map(word => statMap.get(word) || {
        name: word,
        total: 0,
        peakPeriod: "未知",
        concentration: 0,
        period: {"初唐": 0, "盛唐": 0, "中唐": 0, "晚唐": 0, "未知": 0}
      })
      .sort((a, b) => d3.descending(a.total, b.total));
    return {...cfg, index: idx, words, maxTotal: d3.max(words, d => d.total) || 1, total: d3.sum(words, d => d.total)};
  });

  const width = document.getElementById("seasonPanel").clientWidth || 900;
  const height = document.getElementById("seasonPanel").clientHeight || 330;
  const svg = panel.append("svg")
    .attr("class", "semantic-flow-svg")
    .attr("viewBox", [0, 0, width, height]);

  // 四个模块改为四段连续半圆：上、下、上、下交替，拼成类 S 型。
  // 四个半圆横向拉长：不再为右侧说明预留大空白，让最后一组尽量抵达视图右边界。
  // 同时降低纵向幅度与轨道间距，使上下半圆更贴近，整体更像压扁后的连续 S。
  const marginX = width * 0.018;
  const rightReserved = 0;
  const usableW = width - marginX * 2 - rightReserved;
  const segW = usableW / modules.length;
  const baseY = height * 0.49;
  const arcH = Math.min(height * 0.245, segW * 0.39);
  const directions = [-1, 1, -1, 1];

  function rawHalfArcPoint(moduleIndex, u) {
    const dir = directions[moduleIndex] || 1;
    const x0 = marginX + moduleIndex * segW;
    const uu = Math.max(0, Math.min(1, u));
    const x = x0 + segW * uu;
    const v = 2 * uu - 1;
    const y = baseY + dir * arcH * Math.sqrt(Math.max(0, 1 - v * v));
    return {x, y};
  }

  function pointOnHalfArc(moduleIndex, u) {
    const p = rawHalfArcPoint(moduleIndex, u);
    const e = 0.004;
    const p0 = rawHalfArcPoint(moduleIndex, Math.max(0, u - e));
    const p1 = rawHalfArcPoint(moduleIndex, Math.min(1, u + e));
    const dx = p1.x - p0.x;
    const dy = p1.y - p0.y;
    const mag = Math.hypot(dx, dy) || 1;
    return {
      x: p.x,
      y: p.y,
      tx: dx / mag,
      ty: dy / mag,
      nx: -dy / mag,
      ny: dx / mag
    };
  }

  function buildModuleArcPath(moduleIndex, u0, u1, offset) {
    const pts = [];
    const n = 72;
    for (let i = 0; i <= n; i++) {
      const t = i / n;
      const u = u0 + (u1 - u0) * t;
      const p = pointOnHalfArc(moduleIndex, u);
      pts.push({x: p.x + p.nx * offset, y: p.y + p.ny * offset});
    }
    return d3.line()
      .curve(d3.curveCatmullRom.alpha(0.65))
      .x(d => d.x)
      .y(d => d.y)(pts);
  }

  const tracks = d3.range(6).map(i => ({
    index: i,
    offset: (i - 2.5) * 8.8,
    width: 6.2
  }));

  const motifImageFiles = ["moon.jpg", "grass.jpg", "jiangnan.jpg", "xiangsi.jpg"];
  // 圆形插图放在每个半圆的“圆心”空白处：
  // 原来放在半圆拱内部，容易压住轨道；现在统一移到半圆几何圆心附近，
  // 并适度放大，使其成为视觉锚点但不遮挡彩色轨道。
  const photoRadius = Math.min(segW * 0.28, height * 0.24);
  const photoGap = Math.max(34, height * 0.105);
  const photoCenters = modules.map((module, moduleIndex) => {
    const dir = directions[moduleIndex] || 1;
    const apexY = baseY + dir * arcH;
    return {
      x: marginX + segW * (moduleIndex + 0.5),
      y: dir < 0
        ? (apexY + photoRadius + photoGap)
        : (apexY - photoRadius - photoGap)
    };
  });

  const defs = svg.append("defs");
  photoCenters.forEach((c, i) => {
    defs.append("clipPath")
      .attr("id", `motif-photo-clip-${i}`)
      .append("circle")
      .attr("cx", c.x)
      .attr("cy", c.y)
      .attr("r", photoRadius);
  });

  photoCenters.forEach((c, i) => {
    svg.append("circle")
      .attr("class", "semantic-center-photo-frame")
      .attr("cx", c.x)
      .attr("cy", c.y)
      .attr("r", photoRadius + 6);

    svg.append("image")
      .attr("class", "semantic-center-photo-image")
      .attr("href", motifImageFiles[i])
      .attr("x", c.x - photoRadius)
      .attr("y", c.y - photoRadius)
      .attr("width", photoRadius * 2)
      .attr("height", photoRadius * 2)
      .attr("preserveAspectRatio", "xMidYMid slice")
      .attr("clip-path", `url(#motif-photo-clip-${i})`);

    svg.append("circle")
      .attr("class", "semantic-center-photo-ring")
      .attr("cx", c.x)
      .attr("cy", c.y)
      .attr("r", photoRadius + 2.5);
  });

  modules.forEach((module, moduleIndex) => {
    tracks.forEach(track => {
      svg.append("path")
        .attr("class", "semantic-track-bg")
        .attr("d", buildModuleArcPath(moduleIndex, 0.035, 0.965, track.offset))
        .attr("stroke-width", track.width);
    });
  });

  d3.range(1, modules.length).forEach(i => {
    const p = pointOnHalfArc(i, 0);
    svg.append("line")
      .attr("class", "semantic-track-boundary")
      .attr("x1", p.x)
      .attr("y1", p.y - 38)
      .attr("x2", p.x)
      .attr("y2", p.y + 38);

    d3.range(-34, 35, 10).forEach(o => {
      svg.append("circle")
        .attr("cx", p.x)
        .attr("cy", p.y + o)
        .attr("r", 3)
        .attr("fill", "rgba(116,105,78,.25)")
        .attr("stroke", "rgba(255,250,235,.7)")
        .attr("stroke-width", 1);
    });
  });

  modules.forEach((module, moduleIndex) => {
    const angleScale = d3.scaleLinear()
      .domain([0, module.maxTotal])
      .range([0.18, 0.90]);
    const opacityScale = d3.scaleLinear().domain([0, 1]).range([0.34, 0.95]);

    module.words.slice(0, 6).forEach((w, i) => {
      const track = tracks[i];
      const startU = 0.06;
      const endU = startU + 0.88 * angleScale(w.total);

      svg.append("path")
        .attr("class", "semantic-track-active cross-view-imagery")
        .attr("data-imagery", w.name)
        .attr("d", buildModuleArcPath(moduleIndex, startU, Math.min(0.96, endU), track.offset))
        .attr("stroke", module.color)
        .attr("stroke-width", track.width + 1.2)
        .attr("opacity", opacityScale(w.concentration))
        .on("mousemove", event => {
          updatePoemCloudByImagery(w.name);
          showTip(event, `
            <b>${module.name} / ${w.name}</b><br/>
            总频次：${Math.round(w.total)}<br/>
            峰值时期：${w.peakPeriod}<br/>
            时间集中度：${w.concentration.toFixed(2)}<br/>
            初唐 ${w.period["初唐"] || 0}｜盛唐 ${w.period["盛唐"] || 0}｜中唐 ${w.period["中唐"] || 0}｜晚唐 ${w.period["晚唐"] || 0}
          `);
        })
        .on("mouseleave", () => { hideTip(); resetPoemCloud(); });

      const start = pointOnHalfArc(moduleIndex, startU);
      const end = pointOnHalfArc(moduleIndex, Math.min(0.96, endU));
      const sx = start.x + start.nx * track.offset;
      const sy = start.y + start.ny * track.offset;
      const ex = end.x + end.nx * track.offset;
      const ey = end.y + end.ny * track.offset;

      svg.append("text")
        .attr("class", "semantic-track-label cross-view-imagery")
        .attr("data-imagery", w.name)
        .attr("x", sx - 7)
        .attr("y", sy)
        .attr("text-anchor", "end")
        .text(w.name);

      svg.append("circle")
        .attr("class", "semantic-track-dot cross-view-imagery")
        .attr("data-imagery", w.name)
        .attr("cx", ex)
        .attr("cy", ey)
        .attr("r", 4.2)
        .attr("fill", periodDotColor[w.peakPeriod] || periodDotColor["未知"])
        .on("mousemove", event => { updatePoemCloudByImagery(w.name); showTip(event, `<b>${w.name}</b><br/>峰值时期：${w.peakPeriod}`); })
        .on("mouseleave", () => { hideTip(); resetPoemCloud(); });
    });

    const mid = pointOnHalfArc(moduleIndex, 0.50);
    const dir = directions[moduleIndex] || 1;
    const titleY = mid.y + dir * 28;
    svg.append("text")
      .attr("class", "semantic-flow-title")
      .attr("x", mid.x - 56)
      .attr("y", titleY)
      .attr("fill", module.color)
      .text(module.short);
    svg.append("text")
      .attr("class", "semantic-flow-name")
      .attr("x", mid.x - 12)
      .attr("y", titleY + 2)
      .text(module.name);

    const iconMarks = ["☁", "❦", "山", "✦"];
    svg.append("text")
      .attr("class", "semantic-icon-mark")
      .attr("x", mid.x + segW * 0.26)
      .attr("y", titleY + dir * 5)
      .attr("fill", module.color)
      .text(iconMarks[moduleIndex] || "✦");
  });

  // 说明文字已移除，避免与四半圆视图发生遮挡。

  panel.append("div")
    .attr("class", "semantic-period-legend")
    .html(`
      <span><i style="background:${periodDotColor["初唐"]}"></i>初唐</span>
      <span><i style="background:${periodDotColor["盛唐"]}"></i>盛唐</span>
      <span><i style="background:${periodDotColor["中唐"]}"></i>中唐</span>
      <span><i style="background:${periodDotColor["晚唐"]}"></i>晚唐</span>
    `);
}

function drawChord(poems, coNorm, categoryStats){
  ensurePanelText('#chordPanel', '诗词意象共现方式', '弦图中，外圈为高频意象，内部连线表示两个意象在同一首诗中共同出现的强度。', 'small-note');
  const panel = document.getElementById("chordPanel");
  const width = panel.clientWidth, height = panel.clientHeight;
  const svg = d3.select("#chordSvg").attr("viewBox", [0,0,width,height]);
  svg.selectAll("*").remove();

  // 为了给外层 30 位诗人留出空间，内层意象数量不宜过多
  const topNames = new Set(categoryStats.slice(0, 32).map(d => d.name));
  const links = coNorm.filter(d => topNames.has(d.source) && topNames.has(d.target)).slice(0, 180);
  const names = Array.from(new Set(links.flatMap(d => [d.source,d.target])));
  const index = new Map(names.map((d,i)=>[d,i]));
  const matrix = Array.from({length:names.length}, () => Array(names.length).fill(0));
  links.forEach(d => {
    const i=index.get(d.source), j=index.get(d.target);
    matrix[i][j]+=d.value;
    matrix[j][i]+=d.value;
  });

  // 如果某些高频意象没有进入共现边，也给它留一个极小扇区
  categoryStats.slice(0, 32).forEach(d => {
    if(!index.has(d.name)){
      index.set(d.name, names.length);
      names.push(d.name);
      matrix.forEach(row => row.push(0));
      matrix.push(Array(names.length).fill(0));
    }
  });
  names.forEach((name, i) => {
    const freq = categoryStats.find(d => d.name === name)?.value || 1;
    matrix[i][i] += Math.max(1, freq * 0.08);
  });

  const cx = width * .50;
  const cy = height * .49;
  const minWH = Math.min(width, height);

  const imageryOuterR = minWH * .305;
  const imageryInnerR = imageryOuterR - 24;
  const ribbonR = imageryInnerR - 6;

  const poetOuterR = minWH * .445;
  const poetInnerR = poetOuterR - 18;
  const poetLabelR = poetOuterR + 10;

  const g = svg.append("g").attr("transform", `translate(${cx},${cy})`);

  const colorFor = (name) => {
    const row = categoryStats.find(d=>d.name===name);
    return categoryColor.get(row?.category || "未分类") || "#999";
  };

  function polarPoint(r, angle){
    return [Math.cos(angle - Math.PI / 2) * r, Math.sin(angle - Math.PI / 2) * r];
  }

  g.append("circle")
    .attr("r", poetOuterR + 20)
    .attr("fill", "rgba(255,255,255,.12)")
    .attr("stroke", "rgba(90,80,60,.16)");

  // =========================
  // 1. 内层：意象共现弦图
  // =========================
  const chord = d3.chord()
    .padAngle(.018)
    .sortSubgroups(d3.descending)(matrix);

  const arc = d3.arc().innerRadius(imageryInnerR).outerRadius(imageryOuterR);
  const ribbon = d3.ribbon().radius(ribbonR);

  const ribbons = g.append("g").selectAll("path")
    .data(chord)
    .join("path")
    .attr("class", "cross-view-ribbon")
    .attr("data-source", d => names[d.source.index])
    .attr("data-target", d => names[d.target.index])
    .attr("d", ribbon)
    .attr("fill", d => colorFor(names[d.source.index]))
    .attr("fill-opacity", .16)
    .attr("stroke", "rgba(255,255,255,.35)")
    .attr("stroke-width", .3)
    .on("mouseenter", (event,d) => {
      const s = names[d.source.index], t = names[d.target.index];
      updatePoemCloudByImagery(s);
      showTip(event, `<b>${s} × ${t}</b><br/>共现强度：${matrix[d.source.index][d.target.index].toFixed(1)}`);
      ribbons.classed("fade", x => x.source.index!==d.source.index && x.target.index!==d.source.index && x.source.index!==d.target.index && x.target.index!==d.target.index);
      groups.classed("fade", x => x.index!==d.source.index && x.index!==d.target.index);
      poetLinks.classed("fade", true);
    })
    .on("mouseleave", () => {
      hideTip();
      ribbons.classed("fade", false);
      groups.classed("fade", false);
      poetLinks.classed("fade", false).classed("active", false);
      resetPoemCloud();
    });

  const groups = g.append("g").selectAll("g")
    .data(chord.groups)
    .join("g");

  groups.append("path")
    .attr("class", "chord-imagery-arc cross-view-imagery")
    .attr("data-imagery", d => names[d.index])
    .attr("d", arc)
    .attr("fill", d => colorFor(names[d.index]))
    .attr("fill-opacity", .78)
    .attr("stroke", "rgba(250,246,230,.96)")
    .attr("stroke-width", 1)
    .on("mouseenter", (event,d) => {
      const name = names[d.index];
      updatePoemCloudByImagery(name);
      const total = d3.sum(matrix[d.index]);
      const cat = categoryStats.find(x=>x.name===name)?.category || "未分类";
      showTip(event, `<b>${name}</b><br/>类别：${cat}<br/>共现总量：${total.toFixed(1)}`);
      ribbons.classed("fade", x => x.source.index!==d.index && x.target.index!==d.index);
      const related = new Set([name]);
      matrix[d.index].forEach((v, j) => { if(v > 0) related.add(names[j]); });
      groups.classed("fade", x => !related.has(names[x.index]));
      // 意象悬停时只高亮内部“意象 × 意象”关系，不再高亮诗人 → 意象连线，避免外圈大量连线同时变亮。
    })
    .on("mouseleave", () => {
      hideTip();
      ribbons.classed("fade", false);
      groups.classed("fade", false);
      clearGlobalImageryFocus();
      resetPoemCloud();
      // 意象悬停不再影响诗人 → 意象连线，因此这里不重置外圈连线。
    });

  groups.append("text")
    .attr("class", "chord-imagery-label cross-view-imagery")
    .attr("data-imagery", d => names[d.index])
    .each(d => d.angle = (d.startAngle + d.endAngle) / 2)
    .attr("dy", ".32em")
    .attr("transform", d => `rotate(${d.angle * 180 / Math.PI - 90}) translate(${imageryOuterR + 10}) ${d.angle > Math.PI ? "rotate(180)" : ""}`)
    .attr("text-anchor", d => d.angle > Math.PI ? "end" : "start")
    .attr("font-size", 8.5)
    .attr("fill", "#332f27")
    .text(d => names[d.index]);

  const imageryAngleMap = new Map();
  chord.groups.forEach(d => {
    imageryAngleMap.set(names[d.index], (d.startAngle + d.endAngle) / 2);
  });

  // =========================
  // 2. 外层：诗人圆环
  // =========================
  const poetPie = d3.pie()
    .sort(null)
    .value(d => d.value)
    .padAngle(.005);

  const poetArc = d3.arc()
    .innerRadius(poetInnerR)
    .outerRadius(poetOuterR);

  const poetArcs = poetPie(poetRingData);
  const poetAngleMap = new Map();
  poetArcs.forEach(d => poetAngleMap.set(d.data.name, (d.startAngle + d.endAngle) / 2));

  const poetColor = d3.scaleLinear()
    .domain(d3.extent(poetRingData, d => d.value))
    .range(["#d6c8aa", "#967b55"]);

  const poetGroups = g.append("g")
    .selectAll("g")
    .data(poetArcs)
    .join("g");

  poetGroups.append("path")
    .attr("class", "poet-arc")
    .attr("d", poetArc)
    .attr("fill", d => poetColor(d.data.value))
    .attr("stroke", "rgba(250,246,230,.96)")
    .attr("stroke-width", .7)
    .attr("opacity", .88)
    .on("mouseenter", (event,d) => {
      // 悬停诗人：只高亮相关连线，不弹出文字提示，避免遮挡视野。
      hideTip();
      updatePoemCloudByPoet(d.data.name);
      const list = poetTopImageryMap.get(d.data.name) || [];
      poetLinks.classed("fade", x => x.author !== d.data.name)
        .classed("active", x => x.author === d.data.name);
      poetHitLinks.classed("fade", x => x.author !== d.data.name)
        .classed("active", x => x.author === d.data.name);
      poetGroups.selectAll("path").attr("opacity", p => p.data.name === d.data.name ? 1 : .20);
      groups.classed("fade", x => !list.some(y => y.imagery === names[x.index]));
      ribbons.classed("fade", true);
    })
    .on("mouseleave", () => {
      hideTip();
      poetLinks.classed("fade", false).classed("active", false);
      poetHitLinks.classed("fade", false).classed("active", false);
      poetGroups.selectAll("path").attr("opacity", .88);
      groups.classed("fade", false);
      ribbons.classed("fade", false);
      resetPoemCloud();
    });

  poetGroups.append("text")
    .each(d => d.angle = (d.startAngle + d.endAngle) / 2)
    .attr("class", "poet-label")
    .attr("transform", d => `rotate(${d.angle * 180 / Math.PI - 90}) translate(${poetLabelR}) ${d.angle > Math.PI ? "rotate(180)" : ""}`)
    .attr("text-anchor", d => d.angle > Math.PI ? "end" : "start")
    .text(d => d.data.name);

  // =========================
  // 3. 诗人 → 意象 Top 5 细线
  // =========================
  const poetSet = new Set(poetRingData.map(d => d.name));
  const imagerySet = new Set(names);
  const authorImageryCounter = new Map();

  poems.forEach(poem => {
    const author = poem.author;
    if(!poetSet.has(author)) return;

    const arr = Array.isArray(poem.imagery_norm) ? poem.imagery_norm : (poem.matched_imagery || []);
    const unique = [...new Set(arr)].filter(d => imagerySet.has(d));
    unique.forEach(img => {
      const key = `${author}||${img}`;
      authorImageryCounter.set(key, (authorImageryCounter.get(key) || 0) + 1);
    });
  });

  const byAuthor = d3.group(
    Array.from(authorImageryCounter, ([key, value]) => {
      const [author, imagery] = key.split("||");
      return {author, imagery, value};
    }),
    d => d.author
  );

  const poetTopImageryMap = new Map();
  let poetImageryLinks = [];
  byAuthor.forEach((arr, author) => {
    const top5 = arr.sort((a,b) => d3.descending(a.value, b.value)).slice(0, 5);
    poetTopImageryMap.set(author, top5);
    poetImageryLinks = poetImageryLinks.concat(top5);
  });

  // 给每条诗人-意象边分配分组编号、端点偏移与曲线车道。
  // 默认状态只保留极淡关系纹理；悬停诗人/连线时再强高亮，减少大面积重叠造成的脏乱。
  poetImageryLinks.sort((a, b) =>
    d3.ascending(poetAngleMap.get(a.author) || 0, poetAngleMap.get(b.author) || 0) ||
    d3.ascending(imageryAngleMap.get(a.imagery) || 0, imageryAngleMap.get(b.imagery) || 0)
  );

  d3.group(poetImageryLinks, d => d.author).forEach(arr => {
    arr.forEach((d, i) => d.sourceOffset = (i - (arr.length - 1) / 2) * 0.020);
  });
  d3.group(poetImageryLinks, d => d.imagery).forEach(arr => {
    arr.forEach((d, i) => d.targetOffset = (i - (arr.length - 1) / 2) * 0.016);
  });

  const linkWidth = d3.scaleLinear()
    .domain(d3.extent(poetImageryLinks, d => d.value))
    .range([.42, 1.45]);

  const linkOpacity = d3.scaleLinear()
    .domain(d3.extent(poetImageryLinks, d => d.value))
    .range([.028, .11]);

  // 按作者角度排序后连续分配车道，比简单取模更不容易重叠。
  const routeGroups = Array.from(d3.group(poetImageryLinks, d => d.author), ([author, arr]) => ({
    author,
    baseAngle: poetAngleMap.get(author) || 0,
    links: arr.sort((a, b) => d3.ascending(imageryAngleMap.get(a.imagery) || 0, imageryAngleMap.get(b.imagery) || 0))
  })).sort((a, b) => d3.ascending(a.baseAngle, b.baseAngle));

  let routeCursor = 0;
  routeGroups.forEach(group => {
    group.links.forEach((d, i) => {
      d.routeLane = routeCursor;
      d.localLane = i;
    });
    routeCursor += Math.max(1, group.links.length);
  });
  const totalRouteLanes = Math.max(1, routeCursor);

  function normalizeAngle(a){
    while(a > Math.PI) a -= Math.PI * 2;
    while(a < -Math.PI) a += Math.PI * 2;
    return a;
  }

  function polarObject(r, a){
    const [x, y] = polarPoint(r, a);
    return {x, y};
  }

  // 诗人 → 意象：三次贝塞尔曲线，不使用 L 直线段。
  // 起点和终点都沿切向滑入/滑出，中段在外侧通道内绕行，不穿过内部弦图。
  function circularOuterLinkPath(d){
    const sourceBase = poetAngleMap.get(d.author);
    const targetBase = imageryAngleMap.get(d.imagery);
    if(sourceBase == null || targetBase == null) return null;

    const sourceA = sourceBase + (d.sourceOffset || 0);
    const targetA = targetBase + (d.targetOffset || 0);

    const startR = poetInnerR - 4;
    const endR = imageryOuterR + 5;
    const channelInnerR = imageryOuterR + 15;
    const channelOuterR = poetInnerR - 15;
    const channelWidth = Math.max(14, channelOuterR - channelInnerR);

    const laneT = (d.routeLane + 0.5) / totalRouteLanes;
    const routeR = channelInnerR + channelWidth * laneT;

    let delta = normalizeAngle(targetA - sourceA);
    const sign = delta >= 0 ? 1 : -1;
    const absDelta = Math.abs(delta);
    const localShift = ((d.localLane || 0) - 2) * 0.011;
    const lead = Math.min(0.48, Math.max(0.14, absDelta * 0.21));

    const enterA = sourceA + sign * lead + localShift;
    const midA = sourceA + delta * 0.50 + localShift * 0.5;
    const exitA = targetA - sign * lead - localShift;

    const p0 = polarObject(startR, sourceA);
    const p2 = polarObject(routeR, enterA);
    const p3 = polarObject(routeR, midA);
    const p4 = polarObject(routeR, exitA);
    const p6 = polarObject(endR, targetA);

    const c01 = polarObject(startR + (routeR - startR) * .25, sourceA + sign * lead * .06);
    const c02 = polarObject(startR + (routeR - startR) * .78, sourceA + sign * lead * .66);
    const c23a = polarObject(routeR, enterA + normalizeAngle(midA - enterA) * .35);
    const c23b = polarObject(routeR, enterA + normalizeAngle(midA - enterA) * .72);
    const c34a = polarObject(routeR, midA + normalizeAngle(exitA - midA) * .28);
    const c34b = polarObject(routeR, midA + normalizeAngle(exitA - midA) * .68);
    const c56a = polarObject(endR + (routeR - endR) * .78, targetA - sign * lead * .66);
    const c56b = polarObject(endR + (routeR - endR) * .25, targetA - sign * lead * .06);

    return [
      `M${p0.x},${p0.y}`,
      `C${c01.x},${c01.y} ${c02.x},${c02.y} ${p2.x},${p2.y}`,
      `C${c23a.x},${c23a.y} ${c23b.x},${c23b.y} ${p3.x},${p3.y}`,
      `C${c34a.x},${c34a.y} ${c34b.x},${c34b.y} ${p4.x},${p4.y}`,
      `C${c56a.x},${c56a.y} ${c56b.x},${c56b.y} ${p6.x},${p6.y}`
    ].join(" ");
  }

  const linkLayer = g.append("g").attr("class", "poet-imagery-links");

  const poetLinks = linkLayer
    .selectAll("path.poet-imagery-link")
    .data(poetImageryLinks)
    .join("path")
    .attr("class", "poet-imagery-link")
    .attr("d", d => circularOuterLinkPath(d))
    .attr("stroke", d => colorFor(d.imagery))
    .attr("stroke-width", d => linkWidth(d.value))
    .attr("opacity", d => linkOpacity(d.value));

  // 透明粗线用于鼠标命中；视觉上不显示，悬停时高亮对应的真实曲线。
  const poetHitLinks = linkLayer
    .selectAll("path.poet-imagery-hit")
    .data(poetImageryLinks)
    .join("path")
    .attr("class", "poet-imagery-hit")
    .attr("d", d => circularOuterLinkPath(d))
    .on("mouseenter", (event,d) => {
      hideTip();
      updatePoemCloudByPoetImagery(d.author, d.imagery);
      poetLinks.classed("fade", x => x !== d).classed("active", x => x === d);
      poetHitLinks.classed("fade", x => x !== d).classed("active", x => x === d);
      ribbons.classed("fade", true);
      groups.classed("fade", x => names[x.index] !== d.imagery);
      poetGroups.selectAll("path").attr("opacity", p => p.data.name === d.author ? 1 : .20);
    })
    .on("mouseleave", () => {
      hideTip();
      poetLinks.classed("fade", false).classed("active", false);
      poetHitLinks.classed("fade", false).classed("active", false);
      ribbons.classed("fade", false);
      groups.classed("fade", false);
      poetGroups.selectAll("path").attr("opacity", .88);
      resetPoemCloud();
    });

  // 让诗人-意象细线位于诗人环和意象环之间，但不遮住内层 chord
  poetLinks.lower();
  ribbons.lower();

  d3.select("#chordPanel").selectAll(".chord-legend").remove();
  const legendData = Array.from(categoryColor.entries()).filter(([k]) => categoryStats.some(d=>d.category===k));
  const legend = d3.select("#chordPanel").append("div").attr("class", "legend chord-legend");
  legend.selectAll("div").data(legendData).join("div").attr("class", "legend-item")
    .html(d => `<span class="dot" style="background:${d[1]}"></span>${d[0]}`);
}

function drawBubble(categoryStats){
  // 原气泡图替换为“相关诗句词云”。数据由 init() 中的 poemCloudPoems 提供。
  resetPoemCloud();
}

const START_YEAR = 648;
const END_YEAR = 907;
const BIN_SIZE = 30;
const TOP_K = 15;
const MIN_CONSECUTIVE_STREAK = 2;

const rankColors = [
  "#4f87c7", "#3f8f53", "#df8c28", "#2d84a7", "#b99a44", "#d46a5c",
  "#60aebd", "#8d79b8", "#c96f9d", "#84a96b", "#b67d4c", "#6c91a8",
  "#debf44", "#a4512a", "#e07b91", "#6a4ca0", "#93b95f", "#8cb9c8"
];

const periodColors = {
  "初唐": "#b99a44",
  "盛唐": "#df8c28",
  "中唐": "#5f8f78",
  "晚唐": "#6f8fb0"
};

const tooltip = d3.select("#tooltip");

function ensurePanelText(panelSelector, titleText, noteText, noteClass="small-note") {
  const panel = d3.select(panelSelector);
  if(panel.empty()) return;
  panel.selectAll('.panel-title.dynamic-panel-title').remove();
  panel.selectAll(`.${noteClass}.dynamic-panel-note`).remove();
  if(titleText){
    panel.append('div')
      .attr('class', 'panel-title dynamic-panel-title')
      .text(titleText);
  }
  if(noteText){
    panel.append('div')
      .attr('class', `${noteClass} dynamic-panel-note`)
      .html(noteText);
  }
}

function showTip(event, html) {
  tooltip
    .interrupt()
    .html(html)
    .style("left", (event.clientX + 8) + "px")
    .style("top", (event.clientY - 8) + "px")
    .transition()
    .duration(80)
    .style("opacity", .88);
}

function hideTip() {
  tooltip.transition().duration(120).style("opacity", 0);
}

function buildBins() {
  const bins = [];
  for (let start = START_YEAR; start <= END_YEAR; start += BIN_SIZE) {
    const end = Math.min(start + BIN_SIZE - 1, END_YEAR);
    bins.push({ start, end, label: `${start}-${end}`, mid: Math.round((start + end) / 2) });
  }
  return bins;
}

function getBinForYear(year, bins) {
  return bins.find(b => year >= b.start && year <= b.end);
}

function getTangPeriod(year) {
  if (year <= 712) return "初唐";
  if (year <= 765) return "盛唐";
  if (year <= 835) return "中唐";
  return "晚唐";
}

function prepareRankData(rawData) {
  const bins = buildBins();
  const binIndex = new Map(bins.map((b, i) => [b.label, i]));
  const counter = new Map();

  rawData.forEach(d => {
    const year = Number(d.year);
    const imagery = d.imagery;
    const value = Number(d.value);
    if (!imagery || !Number.isFinite(year) || !Number.isFinite(value)) return;
    if (year < START_YEAR || year > END_YEAR) return;
    const bin = getBinForYear(year, bins);
    if (!bin) return;
    const key = `${bin.label}||${imagery}`;
    counter.set(key, (counter.get(key) || 0) + value);
  });

  const rowsByBin = new Map();
  bins.forEach(bin => {
    const rows = [];
    counter.forEach((value, key) => {
      const [label, imagery] = key.split("||");
      if (label !== bin.label) return;
      rows.push({ bin: bin.label, start: bin.start, end: bin.end, mid: bin.mid, imagery, value });
    });
    rows.sort((a, b) => d3.descending(a.value, b.value));
    rowsByBin.set(bin.label, rows);
  });

  const rankRows = [];
  bins.forEach(bin => {
    const rows = rowsByBin.get(bin.label) || [];
    rows.slice(0, TOP_K).forEach((d, i) => rankRows.push({ ...d, rank: i + 1 }));
  });

  const allTopImagery = Array.from(new Set(rankRows.map(d => d.imagery)));
  const totalByImagery = d3.rollup(rankRows, v => d3.sum(v, d => d.value), d => d.imagery);

  const color = d3.scaleOrdinal()
    .domain(allTopImagery.sort((a, b) => d3.descending(totalByImagery.get(a), totalByImagery.get(b))))
    .range(rankColors);

  const byImagery = d3.group(rankRows, d => d.imagery);

  function splitConsecutiveRuns(rows) {
    const sorted = [...rows].sort((a, b) => d3.ascending(a.start, b.start));
    const runs = [];
    let current = [];

    function flushRun() {
      if (current.length >= MIN_CONSECUTIVE_STREAK) runs.push([...current]);
      current = [];
    }

    sorted.forEach(p => {
      if (!current.length) { current = [p]; return; }
      const prev = current[current.length - 1];
      const prevIdx = binIndex.get(prev.bin);
      const currIdx = binIndex.get(p.bin);
      if (currIdx === prevIdx + 1) current.push(p);
      else { flushRun(); current = [p]; }
    });

    flushRun();
    return runs;
  }

  const series = Array.from(byImagery, ([imagery, rows]) => {
    const sortedRows = [...rows].sort((a, b) => d3.ascending(a.start, b.start));
    const runs = splitConsecutiveRuns(sortedRows);
    return { imagery, total: d3.sum(sortedRows, d => d.value), color: color(imagery), points: sortedRows, runs };
  })
    .filter(s => s.runs.length > 0)
    .sort((a, b) => d3.descending(a.total, b.total));

  return { bins, rankRows, series, color };
}

function polarToCartesian(angle, radius) {
  return [Math.cos(angle - Math.PI / 2) * radius, Math.sin(angle - Math.PI / 2) * radius];
}

function angleDiff(a, b) {
  let d = b - a;
  if (d < -Math.PI) d += Math.PI * 2;
  if (d > Math.PI) d -= Math.PI * 2;
  return d;
}

function circularPath(points, angle, radius) {
  if (!points.length) return "";
  const samples = [];

  for (let i = 0; i < points.length - 1; i++) {
    const a = points[i];
    const b = points[i + 1];
    const a0 = angle(a.bin);
    let a1 = angle(b.bin);
    const diff = angleDiff(a0, a1);
    a1 = a0 + diff;

    const r0 = radius(a.rank);
    const r1 = radius(b.rank);
    const steps = 26;

    for (let j = 0; j <= steps; j++) {
      if (i > 0 && j === 0) continue;
      const t = j / steps;
      const ease = t * t * (3 - 2 * t);
      const aa = a0 + (a1 - a0) * t;
      const rr = r0 + (r1 - r0) * ease;
      const [x, y] = polarToCartesian(aa, rr);
      samples.push([x, y]);
    }
  }

  if (points.length === 1) {
    const [x, y] = polarToCartesian(angle(points[0].bin), radius(points[0].rank));
    samples.push([x, y]);
  }

  return d3.line().curve(d3.curveCatmullRom.alpha(0.6))(samples);
}

function drawCircularRankFlow(rawData) {
  ensurePanelText('#timelinePanel', '意象数量排名', '时间轴由线性排列改为环形排列。每一圈代表一个排名层级，越靠近中心排名越高；角度表示每 30 年一个时间段。', 'rank-note');
  const container = document.getElementById("timelinePanel");
  const svgNode = document.getElementById("rankSvg");
  const width = svgNode.clientWidth || Math.max(260, container.clientWidth - 104);
  const height = svgNode.clientHeight || Math.max(220, container.clientHeight - 50);

  const svg = d3.select("#rankSvg").attr("viewBox", [0, 0, width, height]);
  svg.selectAll("*").remove();

  const { bins, rankRows, series } = prepareRankData(rawData);
  const lineRuns = series.flatMap(s => s.runs.map((run, i) => ({ imagery: s.imagery, color: s.color, total: s.total, points: run, runId: `${s.imagery}-${i}` })));

  const cx = width * 0.50;
  const cy = height * 0.54;
  const maxOuter = Math.min(width * 0.39, height * 0.40);
  const innerR = maxOuter * 0.34;
  const outerR = maxOuter;

  const g = svg.append("g").attr("transform", `translate(${cx}, ${cy})`);

  const angle = d3.scalePoint()
    .domain(bins.map(d => d.label))
    .range([-Math.PI * 0.72, Math.PI * 1.28])
    .padding(0.2);

  const radius = d3.scaleLinear()
    .domain([1, TOP_K])
    .range([innerR, outerR]);

  const arcGen = d3.arc();

  // 中央淡色圆与标题
  g.append("circle").attr("r", innerR * .82).attr("fill", "rgba(225,199,151,.22)").attr("stroke", "rgba(80,70,50,.15)");
  g.append("text").attr("class", "center-title").attr("y", -8).text("唐诗");
  g.append("text").attr("class", "center-subtitle").attr("y", 28).text("意象排名流变");

  // 排名同心圆
  g.append("g")
    .selectAll("circle")
    .data(d3.range(1, TOP_K + 1))
    .join("circle")
    .attr("class", d => d === 1 ? "ring-bg main" : "ring-bg")
    .attr("r", d => radius(d));

  // 径向时间刻度线
  g.append("g")
    .selectAll("line")
    .data(bins)
    .join("line")
    .attr("class", "radial-grid")
    .attr("x1", d => polarToCartesian(angle(d.label), innerR * .9)[0])
    .attr("y1", d => polarToCartesian(angle(d.label), innerR * .9)[1])
    .attr("x2", d => polarToCartesian(angle(d.label), outerR * 1.04)[0])
    .attr("y2", d => polarToCartesian(angle(d.label), outerR * 1.04)[1]);

  // 唐代分期外圈弧带
  const periodGroups = d3.groups(bins, d => getTangPeriod(d.mid)).map(([name, arr]) => ({
    name,
    startAngle: angle(arr[0].label) - 0.08,
    endAngle: angle(arr[arr.length - 1].label) + 0.08,
    color: periodColors[name] || "#999"
  }));

  const periodR = outerR * 1.12;
  g.append("g")
    .selectAll("path")
    .data(periodGroups)
    .join("path")
    .attr("class", "period-arc")
    .attr("d", d => arcGen({ innerRadius: periodR, outerRadius: periodR + 16, startAngle: d.startAngle, endAngle: d.endAngle }))
    .attr("stroke", d => d.color)
    .attr("stroke-width", 15);

  g.append("g")
    .selectAll("text")
    .data(periodGroups)
    .join("text")
    .attr("class", "period-label")
    .attr("text-anchor", "middle")
    .attr("x", d => polarToCartesian((d.startAngle + d.endAngle) / 2, periodR + 28)[0])
    .attr("y", d => polarToCartesian((d.startAngle + d.endAngle) / 2, periodR + 28)[1])
    .text(d => d.name);

  // 年份标签
  g.append("g")
    .selectAll("text")
    .data(bins)
    .join("text")
    .attr("class", "year-label")
    .attr("x", d => polarToCartesian(angle(d.label), outerR * 1.22)[0])
    .attr("y", d => polarToCartesian(angle(d.label), outerR * 1.22)[1])
    .attr("transform", d => {
      const a = angle(d.label) * 180 / Math.PI;
      const [x, y] = polarToCartesian(angle(d.label), outerR * 1.22);
      return `rotate(${a}, ${x}, ${y})`;
    })
    .text(d => d.mid);

  // 排名数字标签，放在左上侧
  const rankAngle = -Math.PI * 0.64;
  g.append("g")
    .selectAll("text")
    .data(d3.range(1, TOP_K + 1))
    .join("text")
    .attr("class", "rank-label")
    .attr("x", d => polarToCartesian(rankAngle, radius(d))[0] - 6)
    .attr("y", d => polarToCartesian(rankAngle, radius(d))[1])
    .attr("text-anchor", "end")
    .text(d => d);

  // 曲线
  const pathGroup = g.append("g").attr("class", "paths");

  const paths = pathGroup
    .selectAll("path")
    .data(lineRuns)
    .join("path")
    .attr("class", "flow-line cross-view-imagery")
    .attr("data-imagery", d => d.imagery)
    .attr("d", d => circularPath(d.points, angle, radius))
    .attr("stroke", d => d.color)
    .on("mouseenter", function(event, d) {
      updatePoemCloudByImagery(d.imagery);
      d3.selectAll(".flow-line").classed("muted", p => p.imagery !== d.imagery);
      d3.select(this).classed("active", true);
      const best = d3.min(d.points, p => p.rank);
      const latest = d.points[d.points.length - 1];
      showTip(event, `<b>${d.imagery}</b><br/>连续段长度：${d.points.length}<br/>最佳排名：第 ${best} 名<br/>最近时段：${latest.bin}，第 ${latest.rank} 名<br/>累计出现：${d.total.toFixed(2)}`);
    })
    .on("mouseleave", function() {
      d3.selectAll(".flow-line").classed("muted", false);
      d3.select(this).classed("active", false);
      hideTip();
      resetPoemCloud();
    });

  paths.each(function(d) {
    const length = this.getTotalLength();
    const startIdx = Math.max(0, bins.findIndex(b => b.label === d.points[0]?.bin));
    d3.select(this)
      .attr("stroke-dasharray", `${length} ${length}`)
      .attr("stroke-dashoffset", length)
      .transition()
      .duration(3600)
      .delay(startIdx * 220)
      .ease(d3.easeCubicInOut)
      .attr("stroke-dashoffset", 0);
  });

  // 节点，只显示进入连续线段的点
  const displayPointKeys = new Set(lineRuns.flatMap(run => run.points.map(p => `${p.bin}||${p.imagery}`)));
  const displayRows = rankRows.filter(d => displayPointKeys.has(`${d.bin}||${d.imagery}`));

  g.append("g")
    .selectAll("circle")
    .data(displayRows)
    .join("circle")
    .attr("class", "node cross-view-imagery")
    .attr("data-imagery", d => d.imagery)
    .attr("cx", d => polarToCartesian(angle(d.bin), radius(d.rank))[0])
    .attr("cy", d => polarToCartesian(angle(d.bin), radius(d.rank))[1])
    .attr("r", 3.9)
    .attr("fill", d => {
      const s = series.find(p => p.imagery === d.imagery);
      return s ? s.color : "#999";
    })
    .on("mouseenter", function(event, d) {
      updatePoemCloudByImagery(d.imagery);
      d3.selectAll(".flow-line").classed("muted", p => p.imagery !== d.imagery);
      showTip(event, `<b>${d.imagery}</b><br/>时间段：${d.bin}<br/>排名：第 ${d.rank} 名<br/>出现次数：${d.value.toFixed(2)}`);
    })
    .on("mouseleave", function() {
      d3.selectAll(".flow-line").classed("muted", false);
      hideTip();
      resetPoemCloud();
    });

  // 末端标签
  const lastPoints = series.map(s => {
    const latestRun = [...s.runs].sort((a, b) =>
      d3.ascending(
        bins.findIndex(bin => bin.label === a[a.length - 1].bin),
        bins.findIndex(bin => bin.label === b[b.length - 1].bin)
      )
    )[s.runs.length - 1];
    const p = latestRun[latestRun.length - 1];
    return { imagery: s.imagery, color: s.color, total: s.total, ...p };
  });

  g.append("g")
    .selectAll("text")
    .data(lastPoints)
    .join("text")
    .attr("class", "node-label cross-view-imagery")
    .attr("data-imagery", d => d.imagery)
    .attr("x", d => polarToCartesian(angle(d.bin), radius(d.rank) + 18)[0])
    .attr("y", d => polarToCartesian(angle(d.bin), radius(d.rank) + 18)[1])
    .attr("text-anchor", d => {
      const a = angle(d.bin);
      return Math.cos(a - Math.PI / 2) >= 0 ? "start" : "end";
    })
    .attr("fill", d => d.color)
    .text(d => `${d.imagery} ${d.rank}`);

  // 右侧图例
  d3.select("#timelinePanel .rank-legend").remove();
  const legend = d3.select("#timelinePanel").append("div").attr("class", "rank-legend");
  const legendData = series.slice(0, 16);
  legend.selectAll(".legend-item")
    .data(legendData)
    .join("div")
    .attr("class", "rank-legend-item cross-view-imagery")
    .attr("data-imagery", d => d.imagery)
    .html(d => `<span class="rank-legend-dot" style="background:${d.color}"></span><span class="rank-legend-name">${d.imagery}</span>`)
    .on("mouseenter", (event, d) => { updatePoemCloudByImagery(d.imagery); d3.selectAll(".flow-line").classed("muted", p => p.imagery !== d.imagery).classed("active", p => p.imagery === d.imagery); })
    .on("mouseleave", () => { d3.selectAll(".flow-line").classed("muted", false).classed("active", false); resetPoemCloud(); });

  svg.append("text")
    .attr("x", width * .06)
    .attr("y", height - 8)
    .attr("font-size", 12)
    .attr("fill", "rgba(50,45,35,.62)")
    
}


function drawTimeline(timelineStats, categoryStats){
  const panel = document.getElementById("timelinePanel");
  const width = panel.clientWidth, height = panel.clientHeight;
  const svg = d3.select("#timelineSvg").attr("viewBox", [0,0,width,height]);
  svg.selectAll("*").remove();

  svg.append("text").attr("x", 10).attr("y", 18).attr("class", "label").attr("font-size", 13).text("意象时间演化");
  svg.append("text").attr("x", 10).attr("y", 40).attr("class", "muted-text").text("从初唐到晚唐，高频意象的流动变化");

  const top = new Set(categoryStats.slice(0, 16).map(d=>d.name));
  const rows = timelineStats.filter(d => top.has(d.imagery));
  const periods = periodOrder.filter(p => rows.some(d=>d.period===p));
  const names = Array.from(top).filter(n => rows.some(d=>d.imagery===n)).slice(0, 14);

  const margin = {top:58,right:14,bottom:24,left:44};
  const x = d3.scalePoint().domain(periods).range([margin.left, width-margin.right]).padding(.45);
  const y = d3.scalePoint().domain(names).range([margin.top, height-margin.bottom]).padding(.3);
  const maxV = d3.max(rows, d=>d.value) || 1;
  const stroke = d3.scaleLinear().domain([1,maxV]).range([.4,5]);

  svg.append("g").attr("class","axis").attr("transform",`translate(0,${height-margin.bottom})`).call(d3.axisBottom(x).tickSize(0));
  svg.selectAll(".y-label").data(names).join("text")
    .attr("x", margin.left-8).attr("y", d=>y(d)+3).attr("text-anchor","end").attr("class","tiny").text(d=>d);

  const cell = new Map(rows.map(d=>[`${d.period}||${d.imagery}`, d.value]));
  const line = d3.line().curve(d3.curveMonotoneX).x(d=>x(d.period)).y(d=>y(d.imagery));

  const paths = [];
  names.forEach(name => {
    const pts = periods.map(p => ({period:p, imagery:name, value:cell.get(`${p}||${name}`)||0})).filter(d=>d.value>0);
    for(let i=0;i<pts.length-1;i++) paths.push({imagery:name, a:pts[i], b:pts[i+1], value:(pts[i].value+pts[i+1].value)/2});
  });

  svg.append("g").selectAll("path")
    .data(paths)
    .join("path")
    .attr("d", d => line([d.a,d.b]))
    .attr("fill", "none")
    .attr("stroke", d => categoryColor.get(categoryStats.find(x=>x.name===d.imagery)?.category || "未分类") || "#7aa")
    .attr("stroke-width", d => stroke(d.value))
    .attr("stroke-opacity", .38);

  svg.append("g").selectAll("circle")
    .data(rows.filter(d=>names.includes(d.imagery) && periods.includes(d.period)))
    .join("circle")
    .attr("cx", d=>x(d.period)).attr("cy", d=>y(d.imagery))
    .attr("r", d=>Math.sqrt(d.value)*1.2+1.5)
    .attr("fill", d => categoryColor.get(categoryStats.find(x=>x.name===d.imagery)?.category || "未分类") || "#7aa")
    .attr("fill-opacity", .72)
    .attr("stroke", "rgba(90,70,50,.3)")
    .on("mousemove", (event,d)=>showTip(event, `<b>${d.imagery}</b><br/>时期：${d.period}<br/>出现：${d.value} 首`))
    .on("mouseleave", hideTip);
}

async function init(){
  try{
    const [poems, co, yixiang, rankRaw, poemCloudRaw] = await Promise.all([
      d3.json(FILES.poems),
      d3.json(FILES.co),
      d3.csv(FILES.category),
      d3.json(FILES.rank),
      d3.json(FILES.poemCloud)
    ]);

    const data = aggregateData(poems, co, yixiang);

    // 相关诗句词云单独使用 sampled_1000_imagery_poems.json：
    // 该文件包含 author、title、paragraphs、matched_imagery 等字段。
    poemCloudPoems = preparePoemCloudSource(poemCloudRaw, data.categoryMap);
    poemCloudDefault = poemCloudPoems
      .sort((a,b) => d3.descending((a.imagery_norm || []).length, (b.imagery_norm || []).length))
      .slice(0, 120);
    drawChord(data.poems, data.coNorm, data.categoryStats);
    drawSemanticMotifModules(data.poems, data.categoryStats);
    drawBubble(data.categoryStats);
    drawCircularRankFlow(rankRaw);
  }catch(err){
    console.error(err);
    d3.select(".paper").append("div")
      .style("position","absolute").style("left","40px").style("top","40px").style("z-index",10)
      .style("background","rgba(255,250,235,.95)").style("padding","18px 22px").style("border","1px solid rgba(90,70,50,.2)")
      .style("line-height","1.8").html(`数据加载失败：<br><b>${err.message}</b><br>请确认 poem_time_visual.json、co_occurrence.json、yixiang.csv、timeline_year_imagery_long.json、sampled_1000_imagery_poems.json 与本 HTML 在同一目录，并用本地服务器打开。`);
  }
}

window.addEventListener("resize", () => location.reload());
init();
</script>
